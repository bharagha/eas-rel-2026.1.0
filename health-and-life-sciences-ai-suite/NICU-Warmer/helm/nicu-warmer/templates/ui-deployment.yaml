apiVersion: apps/v1
kind: Deployment
metadata:
  name: nicu-ui
  labels:
    {{- include "nicu-warmer.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: nicu-ui
  template:
    metadata:
      labels:
        app: nicu-ui
    spec:
      containers:
        - name: nicu-ui
          image: "{{ .Values.ui.image.repository }}/{{ .Values.ui.image.name }}:{{ .Values.ui.image.tag }}"
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            {{- if .Values.ingress.enabled }}
            - name: VITE_API_BASE_URL
              value: "/api"
            {{- else }}
            - name: VITE_API_BASE_URL
              value: "http://localhost:5001"
            {{- end }}
            {{- if .Values.http_proxy }}
            - name: HTTP_PROXY
              value: {{ .Values.http_proxy | quote }}
            {{- end }}
            {{- if .Values.https_proxy }}
            - name: HTTPS_PROXY
              value: {{ .Values.https_proxy | quote }}
            {{- end }}
            - name: NO_PROXY
              value: "nicu-backend,nicu-ui,nicu-metrics-collector,nicu-dlsps,localhost,127.0.0.1"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
