apiVersion: apps/v1
kind: Deployment
metadata:
  name: nicu-metrics-collector
  labels:
    {{- include "nicu-warmer.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: nicu-metrics-collector
  template:
    metadata:
      labels:
        app: nicu-metrics-collector
    spec:
      hostPID: true
      containers:
        - name: nicu-metrics-collector
          image: "{{ .Values.metrics.image.repository }}/{{ .Values.metrics.image.name }}:{{ .Values.metrics.image.tag }}"
          imagePullPolicy: {{ .Values.metrics.image.pullPolicy }}
          securityContext:
            privileged: true
          ports:
            - containerPort: 9000
              protocol: TCP
          env:
            - name: METRICS_DIR
              value: "/tmp/results"
            - name: NPU_LOG
              value: "/tmp/results/npu_usage.csv"
            - name: METRICS_HTTP_PORT
              value: "9000"
            - name: DEVICE_ENV_PATH
              value: /configs/device.env
            {{- if .Values.http_proxy }}
            - name: HTTP_PROXY
              value: {{ .Values.http_proxy | quote }}
            {{- end }}
            {{- if .Values.https_proxy }}
            - name: HTTPS_PROXY
              value: {{ .Values.https_proxy | quote }}
            {{- end }}
            - name: NO_PROXY
              value: "nicu-backend,nicu-ui,nicu-metrics-collector,nicu-dlsps,localhost,127.0.0.1"
          volumeMounts:
            - name: results
              mountPath: /tmp/results
            - name: device-config
              mountPath: /configs
              readOnly: true
            - name: dri
              mountPath: /dev/dri
            - name: dev
              mountPath: /dev
            - name: sys
              mountPath: /sys
            - name: sys-devices
              mountPath: /sys/devices
            - name: sys-drm
              mountPath: /sys/class/drm
            - name: sys-debug
              mountPath: /sys/kernel/debug
            - name: run
              mountPath: /run
            - name: proc
              mountPath: /proc
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: results
          emptyDir: {}
        - name: device-config
          configMap:
            name: nicu-device-config
            items:
              - key: device.env
                path: device.env
        - name: dri
          hostPath:
            path: /dev/dri
        - name: dev
          hostPath:
            path: /dev
        - name: sys
          hostPath:
            path: /sys
        - name: sys-devices
          hostPath:
            path: /sys/devices
        - name: sys-drm
          hostPath:
            path: /sys/class/drm
        - name: sys-debug
          hostPath:
            path: /sys/kernel/debug
        - name: run
          hostPath:
            path: /run
        - name: proc
          hostPath:
            path: /proc
