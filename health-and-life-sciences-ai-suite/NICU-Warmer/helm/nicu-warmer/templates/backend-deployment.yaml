apiVersion: apps/v1
kind: Deployment
metadata:
  name: nicu-backend
  labels:
    {{- include "nicu-warmer.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: nicu-backend
  template:
    metadata:
      labels:
        app: nicu-backend
    spec:
      securityContext:
        supplementalGroups: [44, 992]
      containers:
        - name: nicu-backend
          image: "{{ .Values.backend.image.repository }}/{{ .Values.backend.image.name }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: 5001
              protocol: TCP
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: METRICS_SERVICE_URL
              value: {{ .Values.backendConfig.metrics_collector_base_url }}
            - name: NO_PROXY
              value: "nicu-backend,nicu-ui,nicu-metrics-collector,nicu-dlsps,nicu-mqtt,localhost,127.0.0.1,10.0.0.0/8,192.168.0.0/16"
            - name: no_proxy
              value: "nicu-backend,nicu-ui,nicu-metrics-collector,nicu-dlsps,nicu-mqtt,localhost,127.0.0.1,10.0.0.0/8,192.168.0.0/16"
            {{- if .Values.http_proxy }}
            - name: HTTP_PROXY
              value: {{ .Values.http_proxy | quote }}
            - name: http_proxy
              value: {{ .Values.http_proxy | quote }}
            {{- end }}
            {{- if .Values.https_proxy }}
            - name: HTTPS_PROXY
              value: {{ .Values.https_proxy | quote }}
            - name: https_proxy
              value: {{ .Values.https_proxy | quote }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: nicu-device-config
          volumeMounts:
            - name: backend-config
              mountPath: /app/configs/mvp-backend.yaml
              subPath: mvp-backend.yaml
              readOnly: true
            {{- if .Values.models.enabled }}
            - name: models
              mountPath: {{ .Values.models.mountPath }}
            {{- end }}
            {{- if .Values.uploads.enabled }}
            - name: uploads
              mountPath: {{ .Values.uploads.mountPath }}
            {{- end }}
            - name: dri
              mountPath: /dev/dri
            - name: accel
              mountPath: /dev/accel
            {{- if .Values.dlsps.enabled }}
            - name: dlsps-shared
              mountPath: /shared
            {{- end }}
          {{- if .Values.backend.resources.limits }}
          resources:
            limits:
              {{- toYaml .Values.backend.resources.limits | nindent 14 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
        - name: backend-config
          configMap:
            name: nicu-backend-config
        {{- if .Values.models.enabled }}
        - name: models
          persistentVolumeClaim:
            claimName: {{ .Values.models.claimName }}
        {{- end }}
        {{- if .Values.uploads.enabled }}
        - name: uploads
          persistentVolumeClaim:
            claimName: {{ .Values.uploads.claimName }}
        {{- end }}
        - name: dri
          hostPath:
            path: /dev/dri
        - name: accel
          hostPath:
            path: /dev/accel
        {{- if .Values.dlsps.enabled }}
        - name: dlsps-shared
          emptyDir: {}
        {{- end }}
