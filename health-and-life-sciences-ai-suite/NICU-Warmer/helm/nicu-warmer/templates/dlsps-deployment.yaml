{{- if .Values.dlsps.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nicu-dlsps
  labels:
    {{- include "nicu-warmer.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: nicu-dlsps
  template:
    metadata:
      labels:
        app: nicu-dlsps
    spec:
      hostPID: true
      securityContext:
        supplementalGroups: [44, 992]
      initContainers:
        - name: setup-pipeline-dir
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              mkdir -p /var/cache/pipeline_root/user_defined_pipelines/nicu_tee
              cp /pipeline-src/pipeline.json /var/cache/pipeline_root/user_defined_pipelines/nicu_tee/pipeline.json
              chmod -R 777 /var/cache/pipeline_root
          volumeMounts:
            - name: pipeline-root
              mountPath: /var/cache/pipeline_root
            - name: dlsps-pipeline
              mountPath: /pipeline-src
              readOnly: true
      containers:
        - name: nicu-dlsps
          image: "{{ .Values.dlsps.image.repository }}/{{ .Values.dlsps.image.name }}:{{ .Values.dlsps.image.tag }}"
          imagePullPolicy: {{ .Values.dlsps.image.pullPolicy }}
          securityContext:
            privileged: true
            runAsUser: 0
            runAsGroup: 0
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: REST_SERVER_PORT
              value: "8080"
            - name: MQTT_HOST
              value: "nicu-mqtt"
            - name: MQTT_PORT
              value: "1883"
            - name: NO_PROXY
              value: "nicu-backend,nicu-ui,nicu-metrics-collector,nicu-dlsps,nicu-mqtt,localhost,127.0.0.1"
            - name: no_proxy
              value: "nicu-backend,nicu-ui,nicu-metrics-collector,nicu-dlsps,nicu-mqtt,localhost,127.0.0.1"
            {{- if .Values.http_proxy }}
            - name: HTTP_PROXY
              value: {{ .Values.http_proxy | quote }}
            - name: http_proxy
              value: {{ .Values.http_proxy | quote }}
            {{- end }}
            {{- if .Values.https_proxy }}
            - name: HTTPS_PROXY
              value: {{ .Values.https_proxy | quote }}
            - name: https_proxy
              value: {{ .Values.https_proxy | quote }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: nicu-device-config
          volumeMounts:
            - name: models
              mountPath: /models
            - name: dlsps-shared
              mountPath: /shared
            - name: dri
              mountPath: /dev/dri
            - name: sys-drm
              mountPath: /sys/class/drm
              readOnly: true
            - name: dlsps-config
              mountPath: /home/pipeline-server/config.json
              subPath: config.json
              readOnly: true
            - name: pipeline-root
              mountPath: /var/cache/pipeline_root
            - name: extensions
              mountPath: /extensions
              readOnly: true
            - name: uploads
              mountPath: /data/uploads
              readOnly: true
          {{- if .Values.dlsps.resources.limits }}
          resources:
            limits:
              {{- toYaml .Values.dlsps.resources.limits | nindent 14 }}
          {{- end }}
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: {{ .Values.models.claimName }}
        - name: uploads
          persistentVolumeClaim:
            claimName: {{ .Values.uploads.claimName }}
        - name: dlsps-shared
          emptyDir: {}
        - name: pipeline-root
          emptyDir: {}
        - name: dri
          hostPath:
            path: /dev/dri
        - name: sys-drm
          hostPath:
            path: /sys/class/drm
        - name: dlsps-config
          configMap:
            name: nicu-dlsps-config
            items:
              - key: config.json
                path: config.json
        - name: dlsps-pipeline
          configMap:
            name: nicu-dlsps-config
            items:
              - key: pipeline.json
                path: pipeline.json
        - name: extensions
          hostPath:
            path: {{ .Values.assets.loadJob.hostPath }}/extensions
            type: DirectoryOrCreate
{{- end }}
